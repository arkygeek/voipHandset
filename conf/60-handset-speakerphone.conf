# PipeWire virtual sink for the HP Internet Handset base speaker.
#
# Installed at /usr/share/pipewire/pipewire.conf.d/ — PipeWire picks it
# up on startup. Creates a new audio sink named "HP Handset (Speakerphone)"
# that loops back to the device's underlying ALSA card. The voiphandset
# daemon watches for streams attached to this sink and toggles bit 0 of
# the HID feature report so the audio actually comes out of the base
# speaker rather than the handset earpiece.
#
# The handset's ALSA sink is matched by USB vendor + product name (in
# capture.props via match rules) rather than by exact node.name, since
# the node.name varies with the active profile (analog-stereo vs
# iec958-stereo). The match below should work regardless of profile.

context.modules = [
  { name = libpipewire-module-loopback
    args = {
      node.description = "HP Handset (Speakerphone)"
      capture.props = {
        node.name = "handset_speakerphone"
        node.description = "HP Handset (Speakerphone)"
        media.class = "Audio/Sink"
        audio.position = [ FL FR ]
      }
      playback.props = {
        node.name = "handset_speakerphone_playback"
        audio.position = [ FL FR ]
        stream.dont-remix = true
        # Target the HP Internet Handset by USB device.product.name.
        # If you have multiple/distinct profiles, the wildcard tail
        # matches any of them.
        target.object = "alsa_output.usb-Hewlett-Packard_HP_Internet_Handset_0000000001-00.iec958-stereo"
      }
    }
  }
]
